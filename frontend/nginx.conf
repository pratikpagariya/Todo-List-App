# Serves the React SPA on :8080. The ALB sends /api to the backend, so there is
# no API proxy here — Nginx only serves static files + SPA fallback.
server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;   # client-side routing
    }
}
